<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Personal Info – GeneTrace</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
.bmi-display{background:rgba(56,189,248,.06);border:1.5px solid rgba(56,189,248,.2);border-radius:10px;padding:.75rem 1rem;text-align:center}
.bmi-val{font-size:1.8rem;font-weight:800;color:var(--accent)}
.bmi-cat{font-size:.75rem;color:var(--muted);margin-top:.1rem}
.slider-wrap{display:flex;align-items:center;gap:.75rem}
.slider-wrap input[type=range]{flex:1;accent-color:var(--accent)}
.slider-val{min-width:36px;text-align:center;font-weight:700;color:var(--accent);font-size:1rem}
</style>
</head>
<body>
<script src="/static/js/app.js"></script>
<script src="/static/js/layout.js"></script>

<div class="page-header">
  <div class="breadcrumb"><a href="/dashboard">Dashboard</a> › <a href="/family">Family History</a> › Personal Info</div>
  <h1>Personal Health Information</h1>
  <p>Your personal details and lifestyle factors are combined with family history for the prediction.</p>
</div>

<div class="stepper">
  <div class="step done"><div class="step-circle">✓</div><div class="step-label">Family History</div></div>
  <div class="step active"><div class="step-circle">2</div><div class="step-label">Personal Info</div></div>
  <div class="step"><div class="step-circle">3</div><div class="step-label">Results</div></div>
</div>

<div id="alert-box"></div>

<form id="personal-form">
<div class="card mb-2">
  <div class="card-header"><span class="card-title">👤 Demographics</span></div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Gender</label>
      <select class="form-control" id="gender" required>
        <option value="">Select gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Age</label>
      <input type="number" class="form-control" id="age" min="18" max="100" placeholder="e.g. 35" required>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Height (cm)</label>
      <input type="number" class="form-control" id="height" min="100" max="250" placeholder="e.g. 170" oninput="calcBMI()">
    </div>
    <div class="form-group">
      <label class="form-label">Weight (kg)</label>
      <input type="number" class="form-control" id="weight" min="30" max="300" placeholder="e.g. 70" oninput="calcBMI()">
    </div>
    <div class="form-group">
      <label class="form-label">BMI (auto-calculated)</label>
      <div class="bmi-display">
        <div class="bmi-val" id="bmi-val">—</div>
        <div class="bmi-cat" id="bmi-cat">Enter height & weight</div>
      </div>
      <input type="hidden" id="bmi" value="22">
    </div>
  </div>
</div>

<div class="card mb-2">
  <div class="card-header"><span class="card-title">🏃 Lifestyle Factors</span></div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Smoker</label>
      <select class="form-control" id="smoker"><option value="0">No</option><option value="1">Yes</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">Regular Alcohol Consumption</label>
      <select class="form-control" id="alcohol"><option value="0">No</option><option value="1">Yes</option></select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Exercise Level</label>
      <select class="form-control" id="exercise">
        <option value="0">Low (&lt; 1 hr/week)</option>
        <option value="1" selected>Moderate (1–3 hrs/week)</option>
        <option value="2">High (&gt; 3 hrs/week)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Diet Quality</label>
      <select class="form-control" id="diet">
        <option value="0">Poor</option>
        <option value="1" selected>Average</option>
        <option value="2">Good</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Average Sleep — <span id="sleep_val" style="color:var(--accent)">7</span> hrs/night</label>
      <div class="slider-wrap">
        <input type="range" id="sleep_slider" min="3" max="12" step="0.5" value="7" oninput="document.getElementById('sleep_val').textContent=this.value;document.getElementById('sleep').value=this.value;">
      </div>
      <input type="hidden" id="sleep" value="7">
    </div>
    <div class="form-group">
      <label class="form-label">Stress Level — <span id="stress_val" style="color:var(--accent)">5</span> / 10</label>
      <div class="slider-wrap">
        <input type="range" id="stress_slider" min="1" max="10" step="1" value="5" oninput="document.getElementById('stress_val').textContent=this.value;document.getElementById('stress').value=this.value;">
      </div>
      <input type="hidden" id="stress" value="5">
    </div>
  </div>
</div>

<div style="display:flex;gap:1rem;justify-content:flex-end;">
  <a href="/family" class="btn btn-ghost">← Back</a>
  <button type="submit" class="btn btn-primary btn-lg" id="predict-btn">🎯 Run Prediction</button>
</div>
</form>

<script>
Auth.requireAuth();
injectLayout('/personal');

function calcBMI() {
  const h = parseFloat(document.getElementById('height').value);
  const w = parseFloat(document.getElementById('weight').value);
  if (h > 0 && w > 0) {
    const bmi = (w / ((h/100)**2)).toFixed(1);
    document.getElementById('bmi-val').textContent = bmi;
    document.getElementById('bmi').value = bmi;
    let cat = 'Normal weight';
    if (bmi < 18.5) cat = 'Underweight';
    else if (bmi < 25) cat = 'Normal weight';
    else if (bmi < 30) cat = 'Overweight';
    else cat = 'Obese';
    document.getElementById('bmi-cat').textContent = cat;
  }
}

const saved = JSON.parse(localStorage.getItem('gt_personal') || '{}');
['gender','age','height','weight','smoker','alcohol','exercise','diet'].forEach(id => {
  if (saved[id] !== undefined) { const el = document.getElementById(id); if(el) el.value = saved[id]; }
});
if (saved.sleep)  { document.getElementById('sleep').value = saved.sleep; document.getElementById('sleep_slider').value = saved.sleep; document.getElementById('sleep_val').textContent = saved.sleep; }
if (saved.stress) { document.getElementById('stress').value = saved.stress; document.getElementById('stress_slider').value = saved.stress; document.getElementById('stress_val').textContent = saved.stress; }
if (saved.height && saved.weight) calcBMI();

document.getElementById('personal-form').addEventListener('submit', async e => {
  e.preventDefault();
  const alertBox = document.getElementById('alert-box');
  alertBox.innerHTML = '';
  const family = JSON.parse(localStorage.getItem('gt_family') || '{}');
  if (!family.f_diabetes && family.f_diabetes !== 0) {
    alertBox.innerHTML = '<div class="alert alert-warning">⚠ Please complete the Family History step first.</div>';
    return;
  }
  const personal = {
    gender: document.getElementById('gender').value,
    age: +document.getElementById('age').value,
    bmi: +document.getElementById('bmi').value || 22,
    smoker: +document.getElementById('smoker').value,
    alcohol: +document.getElementById('alcohol').value,
    exercise: +document.getElementById('exercise').value,
    diet: +document.getElementById('diet').value,
    sleep: +document.getElementById('sleep').value,
    stress: +document.getElementById('stress').value,
  };
  localStorage.setItem('gt_personal', JSON.stringify(personal));
  const payload = {
    gender: personal.gender, age: personal.age, bmi: personal.bmi,
    smoker: personal.smoker, alcohol: personal.alcohol,
    exercise_level: personal.exercise, diet_quality: personal.diet,
    sleep_hours: personal.sleep, stress_level: personal.stress,
    father_diabetes: family.f_diabetes||0, mother_diabetes: family.m_diabetes||0,
    father_hypertension: family.f_hyp||0, mother_hypertension: family.m_hyp||0,
    father_heart: family.f_heart||0, mother_heart: family.m_heart||0,
    pgf_diabetes: family.pgf_d||0, pgm_diabetes: family.pgm_d||0,
    mgf_diabetes: family.mgf_d||0, mgm_diabetes: family.mgm_d||0,
    father_hair_loss: family.f_hair||0, mother_hair_loss: family.m_hair||0,
    pgf_hair_loss: family.pgf_h||0, mgf_hair_loss: family.mgf_h||0,
    father_diabetes_severity: family.f_diabetes_sev||0, mother_diabetes_severity: family.m_diabetes_sev||0,
    father_heart_severity: family.f_heart_sev||0, mother_heart_severity: family.m_heart_sev||0,
    father_diabetes_onset: family.f_diabetes_onset||0, mother_diabetes_onset: family.m_diabetes_onset||0,
    father_heart_onset: family.f_heart_onset||0, mother_heart_onset: family.m_heart_onset||0,
  };
  const btn = document.getElementById('predict-btn');
  setBtn(btn, true, 'Running AI prediction...');
  showLoading('Running ensemble prediction...');
  try {
    const result = await apiFetch('/predict/', { method:'POST', body: JSON.stringify(payload) });
    PredStore.save(result);
    hideLoading();
    window.location.href = '/result';
  } catch(err) {
    hideLoading();
    alertBox.innerHTML = `<div class="alert alert-danger">⚠ Prediction failed: ${err.message}</div>`;
    setBtn(btn, false, '🎯 Run Prediction');
  }
});
</script>
</body>
</html>
